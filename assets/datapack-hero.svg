<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" width="100%" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="50%" stop-color="#18122B"/>
      <stop offset="100%" stop-color="#05030a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5C542"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="220" rx="16" fill="url(#bgGrad)" stroke="#392467" stroke-width="2"/>

  <!-- Decorative Hex Grid Pattern -->
  <g opacity="0.1" stroke="#8B5CF6" stroke-width="1" fill="none">
    <path d="M 40 20 L 70 20 L 85 46 L 70 72 L 40 72 L 25 46 Z"/>
    <path d="M 100 20 L 130 20 L 145 46 L 130 72 L 100 72 L 85 46 Z"/>
    <path d="M 70 72 L 100 72 L 115 98 L 100 124 L 70 124 L 55 98 Z"/>
    <path d="M 820 120 L 850 120 L 865 146 L 850 172 L 820 172 L 805 146 Z"/>
    <path d="M 760 120 L 790 120 L 805 146 L 790 172 L 760 172 L 745 146 Z"/>
  </g>

  <!-- Title Content -->
  <g transform="translate(60, 80)">
    <text font-family="'Fira Code', 'Segoe UI', monospace" font-weight="800" font-size="38" fill="url(#goldGrad)" filter="url(#glow)">
      🐲 DRAKESCRAFT DATAPACK
    </text>
    <text y="42" font-family="'Inter', sans-serif" font-weight="600" font-size="18" fill="#A0AEC0">
      Native Pause Menu Dialogs System for Purpur 1.21.11
    </text>
    <text y="75" font-family="'Fira Code', monospace" font-weight="500" font-size="14" fill="#8B5CF6">
      100% Server-Side · Zero Mods Required · Pure Vanilla Dialogs (#minecraft:pause_screen_additions)
    </text>
  </g>

  <!-- Animated Pulse Line -->
  <path d="M 60 180 L 860 180" stroke="#392467" stroke-width="3" stroke-linecap="round"/>
  <path d="M 60 180 L 360 180" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round">
    <animate attributeName="d" values="M 60 180 L 360 180; M 560 180 L 860 180; M 60 180 L 360 180" dur="4s" repeatCount="indefinite"/>
  </path>
</svg>
